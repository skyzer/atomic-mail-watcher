services:
  atomic-mail-watcher:
    build: .
    image: atomic-mail-watcher:local
    container_name: atomic-mail-watcher
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    volumes:
      - ./data:/data
    command:
      - --mode
      - watch
      - --send-telegram
      - --reconcile-seconds
      - "1800"
